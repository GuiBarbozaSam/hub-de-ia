services:
  postgres:
    image: postgres:16
    container_name: project_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:0.7.0
    container_name: project_ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - ../backend_python/storage/ollama:/root/.ollama

  ollama-init:
    image: python:3.12-slim
    container_name: project_ollama_init
    depends_on:
      - ollama
    working_dir: /work
    volumes:
      - ./ollama:/work:ro
    environment:
      OLLAMA_PULL_PROFILE: ${OLLAMA_PULL_PROFILE:-balanced}
    command:
      - python
      - /work/init_models.py
      - --base-url
      - http://ollama:11434
      - --catalog
      - /work/model-catalog.json
    restart: "no"

volumes:
  pgdata:
